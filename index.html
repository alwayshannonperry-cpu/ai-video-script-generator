<!DOCTYPE html>
<html>
<head>
  <title>AI Script Generator</title>
</head>

<body style="font-family: Arial; text-align: center; padding: 40px;">

  <h1>AI Video Script Generator</h1>

  <p id="welcome"></p>

  <input id="email" placeholder="Enter your email" style="padding:10px; width:250px;"><br><br>

  <input id="topic" placeholder="Enter topic" style="padding:10px; width:250px;"><br><br>

  <button onclick="generate()" style="padding:10px 20px;">Generate Script</button>

  <br><br>

  <!-- STRIPE BUY BUTTON -->
  <script async src="https://js.stripe.com/v3/buy-button.js"></script>

  <stripe-buy-button
    buy-button-id="buy_btn_1TH27aIaAkGk1KTBFtIev5Dk"
    publishable-key="pk_live_51TGBTSIaAkGk1KTBaGiQYnFniOfNDMYyPu0gSvGCvRRs0QqvhZ1MzE8muf0PiH5yuoH0aHDdh7pRC6kxH12P5V5U00V3ztUdki">
  </stripe-buy-button>

  <p id="status"></p>

  <pre id="output" style="text-align:left; max-width:600px; margin:auto;"></pre>

  <script>

    // detect success from Stripe redirect
    const params = new URLSearchParams(window.location.search);
    if (params.get("success")) {
      document.getElementById("welcome").innerText = "Payment successful! You now have PRO access.";
    }

    async function generate() {
      const topic = document.getElementById("topic").value;
      const email = document.getElementById("email").value;
      const status = document.getElementById("status");

      if (!email) {
        alert("Enter your email");
        return;
      }

      status.innerText = "Checking account...";

      const check = await fetch(`/api/check-pro?email=${email}`);
      const data = await check.json();

      status.innerText = "Generating script...";

      const res = await fetch("/api/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          topic,
          pro: data.pro
        })
      });

      const result = await res.json();

      document.getElementById("output").innerText = result.text;
      status.innerText = "";
    }

  </script>

</body>
</html>
