<!DOCTYPE html>
<html>
<head>
<title>Viral Script Generator</title>

<style>
body{font-family:Arial;background:#f4f4f4;text-align:center;padding:40px;}
.container{background:white;padding:30px;border-radius:10px;max-width:600px;margin:auto;}
input,select{width:80%;padding:10px;margin-top:10px;}
button{padding:10px;margin-top:10px;cursor:pointer;}
#result{margin-top:20px;white-space:pre-wrap;background:#fafafa;padding:15px;}
</style>

</head>

<body>

<div class="container">

<h1>Viral Video Script Generator</h1>
<p>Free: basic scripts • Pro: viral optimized scripts</p>

<input id="email" placeholder="Enter your email">
<br>
<input id="topic" placeholder="Enter topic">
<br>

<button onclick="generate()">Generate Script</button>
<button onclick="upgrade()">Get Viral Scripts</button>

<p id="result"></p>

</div>

<script>

async function generate(){

let email=document.getElementById("email").value
let topic=document.getElementById("topic").value

if(!email){document.getElementById("result").innerText="Enter email";return}
if(!topic){document.getElementById("result").innerText="Enter topic";return}

document.getElementById("result").innerText="Generating..."

let res=await fetch("/api/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,topic})
})

let data=await res.json()
document.getElementById("result").innerText=data.text
}

function upgrade(){
window.location.href="PASTE_STRIPE_LINK_HERE"
}

</script>

</body>
</html>
