<!DOCTYPE html>
<html>

<head>

<title>AI Video Script Generator</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
width:80%;
padding:10px;
font-size:16px;
margin-top:10px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

#result{
margin-top:20px;
white-space:pre-wrap;
text-align:left;
background:#fafafa;
padding:15px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Short Video Script Generator</h1>

<p>Create viral TikTok, Reels, or Shorts scripts instantly.</p>

<input id="topic" placeholder="Enter your video topic">

<br><br>

<button onclick="generate()">Generate Script</button>

<button onclick="copyScript()">Copy Script</button>

<button onclick="clearScript()">Clear</button>

<p id="result"></p>

</div>

<script>

document.getElementById("topic").addEventListener("keypress", function(event){
if(event.key === "Enter"){
generate()
}
})

async function generate(){

let topic=document.getElementById("topic").value

if(!topic){
document.getElementById("result").innerText="Please enter a topic first."
return
}

document.getElementById("result").innerText="Generating..."

let response=await fetch("/api/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({topic:topic})
})

let data=await response.json()

document.getElementById("result").innerText=data.text

}

function copyScript(){

let text=document.getElementById("result").innerText

if(!text){
alert("Nothing to copy yet.")
return
}

navigator.clipboard.writeText(text)

alert("Script copied")

}

function clearScript(){

document.getElementById("result").innerText=""
document.getElementById("topic").value=""

}

</script>

</body>

</html>
