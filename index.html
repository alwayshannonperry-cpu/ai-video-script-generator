<!DOCTYPE html>
<html>
<head>
<title>Viral Script Generator</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:600px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
width:80%;
padding:10px;
margin-top:10px;
}

button{
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}

#result{
margin-top:20px;
white-space:pre-wrap;
background:#fafafa;
padding:15px;
border-radius:5px;
}
</style>

</head>

<body>

<div class="container">

<h1>Viral Video Script Generator</h1>

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" width="80">

<p><strong>Generate viral scripts in seconds</strong></p>

<p>
Free: basic scripts (5/day)<br>
🔥 Pro: viral optimized scripts + unlimited<br>
🎁 3-day free trial included
</p>

<input id="email" placeholder="Enter your email">
<br>
<input id="topic" placeholder="Enter video topic">
<br>

<button onclick="generate()">Generate Script</button>
<br>

<button onclick="upgrade()">🔥 Start 3-Day Free Trial</button>

<p style="font-size:14px;color:#555;">
No charge today. Cancel anytime.
</p>

<p id="result"></p>

</div>

<script>

async function generate() {
  const topic = document.getElementById("topic").value;
  const email = document.getElementById("email").value;

  const status = document.getElementById("status");
  status.innerText = "Checking account...";

  // check pro
  const check = await fetch(`/api/check-pro?email=${email}`);
  const data = await check.json();

  status.innerText = "Generating script...";

  const res = await fetch("/api/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      topic,
      pro: data.pro
    })
  });

  const result = await res.json();

  document.getElementById("output").innerText = result.text;
  status.innerText = "";
}
</script>

</html>
window.location.href="PASTE_YOUR_STRIPE_PAYMENT_LINK_HERE"
}

</script>
